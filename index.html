<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Empires — RTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
        }

        canvas#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: default;
        }

        /* Loading Screen (Zen Style) */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #16161a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            font-family: 'Inter', sans-serif;
            color: #e8e4de;
        }

        #loading-screen.visible {
            opacity: 1;
            pointer-events: all;
        }

        #loading-screen.fade-out {
            opacity: 0;
        }

        .loading-content {
            width: 60%;
            max-width: 400px;
            text-align: center;
        }

        .loading-title {
            font-family: 'Noto Serif JP', serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 4px;
            color: #f5f0ea;
        }

        .loading-subtitle {
            font-size: 0.85rem;
            color: #c2185b;
            letter-spacing: 8px;
            margin-bottom: 4rem;
            text-transform: uppercase;
        }

        .loading-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #71717a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #loading-text {
            color: #71717a;
        }

        #loading-percentage {
            color: #e8e4de;
        }

        .loading-bar-wrapper {
            width: 100%;
            height: 2px;
            background: #28282e;
            overflow: hidden;
        }

        #loading-bar-fill {
            height: 100%;
            width: 0%;
            background: #c2185b;
            transition: width 0.1s linear;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="loading-screen">
        <div class="loading-content">
            <h1 class="loading-title">Pixel Empires</h1>
            <div class="loading-subtitle">戦国 — CHIẾN QUỐC</div>
            <div class="loading-info">
                <span id="loading-text">Preparing Battle...</span>
                <span id="loading-percentage">0%</span>
            </div>
            <div class="loading-bar-wrapper">
                <div id="loading-bar-fill"></div>
            </div>
        </div>
    </div>

    <script type="module" src="./index.ts"></script>
</body>

</html>
