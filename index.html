<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Empires — RTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
        }

        canvas#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: default;
        }

        /* Loading Screen (Warcraft Style) */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2a2a2a 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            font-family: 'MedievalSharp', cursive;
            color: #fceea7;
        }

        #loading-screen.visible {
            opacity: 1;
            pointer-events: all;
        }

        #loading-screen.fade-out {
            opacity: 0;
        }

        .loading-content {
            width: 80%;
            max-width: 800px;
            margin-bottom: 8vh;
            text-align: center;
        }

        .loading-title {
            font-size: 3.5rem;
            margin-bottom: 3rem;
            text-shadow: 2px 2px 5px #000, 0 0 20px rgba(255, 215, 0, 0.4);
            letter-spacing: 2px;
        }

        .loading-info {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            text-shadow: 1px 1px 3px #000;
            margin-bottom: 5px;
            padding: 0 5px;
        }

        #loading-text {
            color: #ddd;
        }

        #loading-percentage {
            color: #fceea7;
            font-weight: bold;
        }

        .loading-bar-wrapper {
            position: relative;
            width: 100%;
            height: 24px;
            background: #111;
            border: 2px solid #5a4b29;
            border-radius: 3px;
            box-shadow: 0 0 10px #000 inset, 0 0 5px rgba(255, 215, 0, 0.2);
            overflow: hidden;
        }

        #loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to bottom, #e33, #800);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            transition: width 0.1s linear;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="loading-screen">
        <div class="loading-content">
            <h1 class="loading-title">Pixel Empires</h1>
            <div class="loading-info">
                <span id="loading-text">Preparing Battle...</span>
                <span id="loading-percentage">0%</span>
            </div>
            <div class="loading-bar-wrapper">
                <div id="loading-bar-fill"></div>
            </div>
        </div>
    </div>

    <script src="./index.ts"></script>
</body>

</html>
