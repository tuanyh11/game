<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Blade shadow -->
  <line x1="10" y1="24" x2="22" y2="12" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  <!-- Blade body -->
  <line x1="10" y1="23" x2="21" y2="12" stroke="#b8c0d0" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Blade highlight -->
  <line x1="11" y1="22" x2="20" y2="13" stroke="#e8ecf4" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Blade tip -->
  <line x1="19" y1="14" x2="23" y2="10" stroke="#e0e8f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="13" x2="24" y2="9" stroke="#f4f8ff" stroke-width="1" stroke-linecap="round"/>
  <!-- Cross guard shadow -->
  <line x1="15" y1="23" x2="9" y2="17" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  <!-- Cross guard gold -->
  <line x1="15" y1="23" x2="9" y2="17" stroke="#daa520" stroke-width="3" stroke-linecap="round"/>
  <!-- Guard gem -->
  <circle cx="12" cy="20" r="1.8" fill="#ff3333"/>
  <circle cx="12" cy="20" r="0.8" fill="#ff8888"/>
  <!-- Grip shadow -->
  <line x1="9" y1="24" x2="5" y2="28" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  <!-- Grip leather -->
  <line x1="9" y1="24" x2="5" y2="28" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <!-- Grip wraps -->
  <line x1="8" y1="25" x2="7" y2="25.5" stroke="#daa520" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="26" x2="6" y2="26.8" stroke="#daa520" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="27" x2="5.2" y2="27.8" stroke="#daa520" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Pommel -->
  <circle cx="4.5" cy="28.5" r="2.5" fill="#111"/>
  <circle cx="4.5" cy="28.5" r="2" fill="#daa520"/>
  <circle cx="4.5" cy="28.5" r="0.8" fill="#ffdd44"/>
</svg>
