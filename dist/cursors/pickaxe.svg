<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Handle shadow -->
  <line x1="6" y1="28" x2="18" y2="16" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <!-- Handle wood -->
  <line x1="6" y1="28" x2="18" y2="16" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pick head shadow -->
  <line x1="14" y1="12" x2="24" y2="8" stroke="#222" stroke-width="5" stroke-linecap="round"/>
  <!-- Pick head metal -->
  <line x1="14" y1="12" x2="24" y2="8" stroke="#8090a0" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Pick point -->
  <line x1="22" y1="9" x2="26" y2="6" stroke="#b0b8c8" stroke-width="2" stroke-linecap="round"/>
  <line x1="23" y1="8" x2="27" y2="5" stroke="#e0e8f0" stroke-width="1" stroke-linecap="round"/>
  <!-- Back spike -->
  <line x1="14" y1="12" x2="12" y2="8" stroke="#8090a0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="11" x2="12" y2="8" stroke="#b0b8c8" stroke-width="1" stroke-linecap="round"/>
  <!-- Gold sparkle -->
  <circle cx="25" cy="6" r="1.5" fill="#ffd700"/>
  <circle cx="25" cy="6" r="0.7" fill="#ffee88"/>
  <!-- Pommel -->
  <circle cx="5" cy="29" r="2" fill="#111"/>
  <circle cx="5" cy="29" r="1.5" fill="#8B6914"/>
</svg>
