<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Empires — RTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Inter', sans-serif;
        }

        canvas#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: default;
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d4af37;
            font-family: 'MedievalSharp', cursive;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #loading-screen.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
        }

        #loading-screen.fade-out {
            transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-title {
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.3);
            border-top: 4px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            color: #a0aab5;
            letter-spacing: 1px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        #loading-percentage {
            font-family: 'MedievalSharp', cursive;
            font-size: 24px;
            color: #d4af37;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="loading-content">
            <h1 class="loading-title">Pixel Empires</h1>
            <div class="loading-spinner"></div>
            <p id="loading-text" class="loading-text">Đang chuẩn bị dữ liệu...</p>
            <p id="loading-percentage">0%</p>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="./index.ts"></script>
</body>

</html>
